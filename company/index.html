<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContactPit | Company</title>
    <meta
      name="description"
      content="ContactPit company intelligence view with overview, financial pulse, contacts, and people."
    />
    <link rel="stylesheet" href="../styles.css?v=__ASSET_VERSION__" />
  </head>
  <body class="detail-page detail-page-company" data-page-key="company">
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="/" data-i18n-aria-label="site.brand.home">
          <img class="brand-mark-image" src="../assets/ios/Icon.svg" alt="" width="40" height="40" />
          <span class="brand-text">ContactPit</span>
        </a>
        <nav class="main-nav" aria-label="Main navigation">
          <a href="/" data-i18n="nav.home">Home</a>
          <a href="/filters/" data-i18n="nav.filters">Filters</a>
          <a href="/blog/" data-i18n="nav.blog">Blog</a>
          <a href="/about/" data-i18n="nav.about">About us</a>
        </nav>
        <div class="topbar-actions">
          <div class="language-switcher" data-language-switcher>
            <span class="language-switcher-label" data-language-label></span>
            <button class="language-switcher-trigger" type="button" data-language-trigger aria-expanded="false">
              <span data-language-current>🇬🇧</span>
            </button>
            <div class="language-switcher-menu" data-language-menu hidden>
              <button type="button" role="menuitemradio" data-set-locale="en" aria-checked="true">🇬🇧</button>
              <button type="button" role="menuitemradio" data-set-locale="et" aria-checked="false">🇪🇪</button>
            </div>
          </div>
          <a class="primary-link" href="/filters/" data-i18n="nav.buildList">Build a list</a>
        </div>
      </header>

      <main>
        <section class="section">
          <div class="company-detail-root" id="company-detail-root" aria-live="polite">
            <p class="detail-state" data-i18n="Loading company…">Loading company…</p>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="../shared/page-init.js?v=__ASSET_VERSION__"></script>
    <script type="module" src="./company.js?v=__ASSET_VERSION__"></script>
  </body>
</html>
